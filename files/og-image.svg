<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6E40C9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Purple accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#6E40C9" opacity="0.08"/>
  <circle cx="1100" cy="500" r="150" fill="#6E40C9" opacity="0.06"/>
  <circle cx="80" cy="500" r="100" fill="#6E40C9" opacity="0.05"/>

  <!-- Top label -->
  <rect x="60" y="60" width="220" height="36" rx="18" fill="#6E40C9" opacity="0.3"/>
