  <text x="314" y="466" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="600">📧 Email</text>

  <!-- Research -->
  <rect x="408" y="440" width="160" height="40" rx="20" fill="#2d3748"/>
  <text x="488" y="466" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="600">🔍 Research</text>

  <!-- Marketing -->
  <rect x="582" y="440" width="160" height="40" rx="20" fill="#2d3748"/>
