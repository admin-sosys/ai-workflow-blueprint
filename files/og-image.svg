  <rect x="408" y="495" width="160" height="40" rx="20" fill="#2d3748"/>
  <text x="488" y="521" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="600">⚡ Productivity</text>

