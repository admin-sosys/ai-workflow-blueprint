  <rect x="844" y="402" width="260" height="8" rx="4" fill="#2d4a6e" opacity="0.5"/>
  <rect x="844" y="418" width="240" height="8" rx="4" fill="#2d4a6e" opacity="0.5"/>
  <rect x="844" y="434" width="200" height="8" rx="4" fill="#2d4a6e" opacity="0.4"/>
  <rect x="844" y="450" width="220" height="8" rx="4" fill="#2d4a6e" opacity="0.4"/>

  <!-- Page number -->
  <text x="985" y="492" font-family="system-ui, sans-serif" font-size="11" fill="#4a5568" text-anchor="middle">64 pages · PDF</text>
