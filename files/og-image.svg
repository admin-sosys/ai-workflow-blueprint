  <!-- Main headline -->
  <text x="60" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-1">50 AI Workflows</text>
  <text x="60" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-1">That <tspan fill="#9B6EF5">Actually Work</tspan></text>

